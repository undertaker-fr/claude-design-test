<script>(function(){var p=location.pathname.split('/').pop().replace('.html','')||'index';document.querySelectorAll('#site-nav a').forEach(function(a){if(a.dataset.page===p){a.style.background='rgba(10,132,255,0.25)';a.style.color='#fff'}a.addEventListener('mouseenter',function(){if(a.dataset.page!==p){a.style.background='rgba(255,255,255,0.08)';a.style.color='#fff'}});a.addEventListener('mouseleave',function(){if(a.dataset.page!==p){a.style.background='transparent';a.style.color='#B0BEC9'}})})})();</script>

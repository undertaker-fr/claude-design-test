<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Velorah — Where dreams rise through the silence</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: 'hsl(var(--background))',
          foreground: 'hsl(var(--foreground))',
          'muted-foreground': 'hsl(var(--muted-foreground))',
          primary: 'hsl(var(--primary))',
          'primary-foreground': 'hsl(var(--primary-foreground))',
          secondary: 'hsl(var(--secondary))',
          muted: 'hsl(var(--muted))',
          accent: 'hsl(var(--accent))',
          border: 'hsl(var(--border))',
          input: 'hsl(var(--input))',
        },
        fontFamily: {
          display: ['"Instrument Serif"', 'serif'],
          body: ['Inter', 'sans-serif'],
        },
        maxWidth: {
          '7xl': '80rem',
        },
      }
    }
  }
</script>

<style>
  :root {
    --background: 201 100% 13%;
    --foreground: 0 0% 100%;
    --muted-foreground: 240 4% 66%;
    --primary: 0 0% 100%;
    --primary-foreground: 0 0% 4%;
    --secondary: 0 0% 10%;
    --muted: 0 0% 10%;
    --accent: 0 0% 10%;
    --border: 0 0% 18%;
    --input: 0 0% 18%;
    --font-display: 'Instrument Serif', serif;
    --font-body: 'Inter', sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Liquid glass effect — exact spec */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass:hover { transform: scale(1.03); }

  /* Fade rise animation */
  @keyframes fade-rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-rise          { animation: fade-rise 0.8s ease-out both; }
  .animate-fade-rise-delay    { animation: fade-rise 0.8s ease-out 0.2s both; }
  .animate-fade-rise-delay-2  { animation: fade-rise 0.8s ease-out 0.4s both; }

  /* Subtle vignette to lift text readability over bright video frames */
  .video-scrim {
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 35%, rgba(0,0,0,0.35) 100%);
  }

  h1, .font-display { font-family: var(--font-display); }

  /* Hero heading exact spec */
  .hero-h1 {
    font-family: 'Instrument Serif', serif;
    line-height: 0.95;
    letter-spacing: -2.46px;
    font-weight: 400;
  }
</style>
</head>
<body class="min-h-screen">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
  const { useEffect, useRef } = React;

  const VIDEO_SRC = "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4";

  function Nav() {
    const links = [
      { label: "Home", active: true },
      { label: "Studio" },
      { label: "About" },
      { label: "Journal" },
      { label: "Reach Us" },
    ];
    return (
      <nav className="relative z-10">
        <div className="max-w-7xl mx-auto px-8 py-6 flex items-center justify-between">
          {/* Logo */}
          <a href="#" className="text-3xl tracking-tight text-foreground"
             style={{ fontFamily: "'Instrument Serif', serif" }}>
            Velorah<sup className="text-xs">®</sup>
          </a>

          {/* Links */}
          <ul className="hidden md:flex items-center gap-10">
            {links.map((l) => (
              <li key={l.label}>
                <a
                  href="#"
                  className={
                    "text-sm transition-colors " +
                    (l.active
                      ? "text-foreground"
                      : "text-muted-foreground hover:text-foreground")
                  }
                >
                  {l.label}
                </a>
              </li>
            ))}
          </ul>

          {/* CTA */}
          <button
            className="liquid-glass rounded-full px-6 py-2.5 text-sm text-foreground cursor-pointer"
            type="button"
          >
            Begin Journey
          </button>
        </div>
      </nav>
    );
  }

  function Hero() {
    return (
      <section className="relative z-10 flex flex-col items-center text-center px-6 pt-32 pb-40 py-[90px]">
        <h1 className="hero-h1 animate-fade-rise text-5xl sm:text-7xl md:text-8xl max-w-7xl text-foreground">
          Where <em className="not-italic text-muted-foreground">dreams</em> rise<br className="hidden sm:block" />
          {" "}<em className="not-italic text-muted-foreground">through the silence.</em>
        </h1>

        <p className="animate-fade-rise-delay text-muted-foreground text-base sm:text-lg max-w-2xl mt-8 leading-relaxed">
          We're designing tools for deep thinkers, bold creators, and quiet rebels.
          Amid the chaos, we build digital spaces for sharp focus and inspired work.
        </p>

        <button
          className="animate-fade-rise-delay-2 liquid-glass rounded-full px-14 py-5 text-base text-foreground mt-12 cursor-pointer"
          type="button"
        >
          Begin Journey
        </button>
      </section>
    );
  }

  function VideoBackground() {
    const ref = useRef(null);
    useEffect(() => {
      const v = ref.current;
      if (!v) return;
      v.muted = true;
      const p = v.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    }, []);
    return (
      <>
        <video
          ref={ref}
          className="absolute inset-0 w-full h-full object-cover z-0"
          src={VIDEO_SRC}
          autoPlay
          loop
          muted
          playsInline
          preload="auto"
        />
        <div className="absolute inset-0 z-0 video-scrim pointer-events-none" />
      </>
    );
  }

  function App() {
    return (
      <div className="relative min-h-screen w-full overflow-hidden bg-background">
        <VideoBackground />
        <div className="relative z-10 flex flex-col min-h-screen">
          <Nav />
          <div className="flex-1 flex items-center justify-center">
            <Hero />
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
